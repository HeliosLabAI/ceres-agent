<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="16" y="16" width="224" height="224" rx="48" fill="url(#bgGradient)"/>
  
  <!-- Code brackets - left -->
  <text x="50" y="160" font-family="Consolas, monospace" font-size="120" font-weight="bold" fill="#ffffff" opacity="0.9">&lt;</text>
  
  <!-- Code brackets - right -->
  <text x="170" y="160" font-family="Consolas, monospace" font-size="120" font-weight="bold" fill="#ffffff" opacity="0.9">&gt;</text>
  
  <!-- AI sparkle/star in center -->
  <path d="M128 60 L135 100 L175 100 L143 125 L155 165 L128 140 L101 165 L113 125 L81 100 L121 100 Z" 
        fill="url(#accentGradient)" filter="url(#glow)"/>
  
  <!-- Small dots representing multi-agent -->
  <circle cx="60" cy="200" r="8" fill="#22c55e" opacity="0.8"/>
  <circle cx="90" cy="200" r="8" fill="#22c55e" opacity="0.6"/>
  <circle cx="120" cy="200" r="8" fill="#22c55e" opacity="0.4"/>
</svg>
